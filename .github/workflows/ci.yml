name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    name: Lint · Build · Test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Use the runner's default Xcode — it has iOS simulator runtimes
      # pre-installed. Pinning a specific Xcode_*.app can select a version whose
      # simulator runtime isn't installed (the "iOS NN.0 is not installed" error).
      - name: Show Xcode
        run: xcodebuild -version

      - name: Install tools
        run: brew install xcodegen swiftlint xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: SwiftLint
        run: swiftlint --strict

      - name: Build & test
        shell: bash
        run: |
          set -euo pipefail   # without pipefail, '| xcbeautify' masks xcodebuild failures
          # Pick an installed iPhone simulator dynamically rather than pinning an
          # OS version that may not be present on the runner image.
          UDID=$(xcrun simctl list devices available \
            | awk -F '[()]' '/iPhone/{udid=$2} END{print udid}')
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found:"; xcrun simctl list devices; exit 1
          fi
          echo "Using simulator UDID: $UDID"
          xcodebuild test \
            -scheme Pocket \
            -destination "id=$UDID" \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
        env:
          NSUnbufferedIO: YES