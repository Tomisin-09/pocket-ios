# XcodeGen spec. The .xcodeproj is generated from this file, not hand-edited —
# this keeps the project diffable and avoids .pbxproj merge conflicts.
# Regenerate with: xcodegen generate
name: Ore
options:
  bundleIdPrefix: click.decooperations.ore
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # set via CI / local xcconfig; do not hard-code

# Per-configuration backend base URL (Debug → dev, Release → prod).
configs:
  Debug: debug
  Release: release

targets:
  Ore:
    type: application
    platform: iOS
    sources:
      - path: Ore
    info:
      path: Ore/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: click.decooperations.ore
        INFOPLIST_FILE: Ore/Resources/Info.plist
        CODE_SIGN_STYLE: Manual
      configs:
        Debug:
          ORE_API_BASE_URL: "http:\\/\\/localhost:8787"
        Release:
          ORE_API_BASE_URL: "https:\\/\\/api.ore.example.com"
    entitlements:
      path: Ore/Resources/Ore.entitlements

  OreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OreTests
    dependencies:
      - target: Ore

  OreUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OreUITests
    dependencies:
      - target: Ore

schemes:
  Ore:
    build:
      targets:
        Ore: all
    test:
      targets:
        - OreTests
        - OreUITests
      gatherCoverageData: true