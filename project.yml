# XcodeGen spec. The .xcodeproj is generated from this file, not hand-edited —
# this keeps the project diffable and avoids .pbxproj merge conflicts.
# Regenerate with: xcodegen generate
name: Pocket
options:
  bundleIdPrefix: click.decooperations.pocket
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # set via CI / local xcconfig; do not hard-code

# Per-configuration backend base URL (Debug → dev, Release → prod).
configs:
  Debug: debug
  Release: release

targets:
  Pocket:
    type: application
    platform: iOS
    sources:
      - path: Pocket
    # No `info:` block on purpose: the Info.plist is hand-maintained (it carries
    # documented usage strings, background modes and the portrait lock). An
    # `info:` block makes XcodeGen *generate* — i.e. overwrite — that file on
    # every `xcodegen generate`, silently dropping those keys. The build picks
    # it up via INFOPLIST_FILE below instead.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: click.decooperations.pocket
        INFOPLIST_FILE: Pocket/Resources/Info.plist
        CODE_SIGN_STYLE: Manual
      # Backend base URL is injected per-config in Phase 4 (when the proxy
      # exists). Note: '//' in an Xcode build setting is treated as a comment,
      # so the URL is supplied via an .xcconfig using the `$()//` escape, not
      # inline here. Placeholders below are host-only to avoid that footgun.
      configs:
        Debug:
          POCKET_API_HOST: "localhost:8787"
        Release:
          POCKET_API_HOST: "api.pocket.example.com"
    entitlements:
      path: Pocket/Resources/Pocket.entitlements

  PocketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PocketTests
    # Test bundles have no hand-maintained Info.plist; let Xcode generate one.
    # Xcode 26.5 no longer defaults this on, so without it the bundle can't
    # code-sign and the suite fails to build.
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Pocket

  PocketUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PocketUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Pocket

schemes:
  Pocket:
    build:
      targets:
        Pocket: all
    test:
      targets:
        - PocketTests
        - PocketUITests
      gatherCoverageData: true