# SwiftLint configuration. Run `swiftlint` before every push (see AGENTS.md).
disabled_rules:
  - todo # TODOs are tracked as pocket-0XX tickets, not flagged by the linter

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping

excluded:
  - .build
  - DerivedData
  - Pocket.xcodeproj
  - fastlane

line_length:
  warning: 120
  error: 160
  ignores_comments: true

identifier_name:
  excluded:
    - id
    - to
    - a
    - b

# "Mastery" (skill mastery — ADR 0036's loop/song practice field) contains the
# substring "master" but is unrelated to the master/slave lexicon the rule targets.
inclusive_language:
  override_allowed_terms:
    - mastery

force_cast: error
force_try: error
force_unwrapping: warning